<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Talk to Lilly</title>
  <style>
    :root {
      --bg: #0f0a12;
      --panel: #1a1220;
      --accent: #ff4d8d;
      --accent-dim: #c23a6a;
      --text: #f5eef2;
      --muted: #a8919c;
      --bubble-me: #3a1f32;
      --bubble-lilly: #25182c;
      --border: #3d2a38;
      --error: #ff8fab;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #3a1530 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 10, 18, 0.9);
      backdrop-filter: blur(8px);
    }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 650; color: var(--accent); }
    header p { margin: 4px 0 0; color: var(--muted); font-size: 0.8rem; }
    main {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
    }
    .msg.me { align-self: flex-end; background: var(--bubble-me); }
    .msg.lilly { align-self: flex-start; background: var(--bubble-lilly); }
    .msg .who { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
    .msg img {
      display: block;
      max-width: 100%;
      border-radius: 10px;
      margin-top: 8px;
    }
    .msg.typing { color: var(--muted); font-style: italic; }
    #composer {
      display: flex;
      gap: 8px;
      padding: 12px 16px 8px;
      border-top: 1px solid var(--border);
      background: rgba(15, 10, 18, 0.95);
    }
    #composer input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 1rem;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: white;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .actions {
      display: flex;
      gap: 8px;
      padding: 0 16px 16px;
    }
    .actions button { flex: 1; }
    #error {
      color: var(--error);
      font-size: 0.85rem;
      min-height: 1.2em;
      padding: 0 16px 8px;
      margin: 0;
    }
    #status {
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0 16px 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Talk to Lilly 💕</h1>
    <p>Your flirty creator — chat, get spicy, ask for pics</p>
  </header>

  <main>
    <div id="messages"></div>
    <p id="error"></p>
    <p id="status"></p>
    <div id="composer">
      <input id="input" type="text" placeholder="Message Lilly…" autocomplete="off" autofocus />
      <button id="send" type="button">Send</button>
    </div>
    <div class="actions">
      <button id="pic" class="secondary" type="button">Send + pic 📷</button>
    </div>
  </main>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendEl = document.getElementById("send");
    const picEl = document.getElementById("pic");
    const errorEl = document.getElementById("error");
    const statusEl = document.getElementById("status");

    const sessionId = "web:" + (localStorage.getItem("lilly-name") || "guest") + ":" + Date.now();

    function addMessage(role, text, images) {
      const el = document.createElement("div");
      el.className = "msg " + (role === "me" ? "me" : "lilly");
      const who = document.createElement("div");
      who.className = "who";
      who.textContent = role === "me" ? "You" : "Lilly";
      el.appendChild(who);
      const body = document.createElement("div");
      body.textContent = text;
      el.appendChild(body);
      if (images && images.length) {
        images.forEach(function (url) {
          const img = document.createElement("img");
          img.src = url;
          img.alt = "Lilly";
          img.loading = "lazy";
          el.appendChild(img);
        });
      }
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function addTyping() {
      const el = document.createElement("div");
      el.className = "msg lilly typing";
      el.textContent = "Lilly is typing…";
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    let sending = false;

    async function send(wantImage) {
      const message = inputEl.value.trim();
      if (!message || sending) return;

      sending = true;
      errorEl.textContent = "";
      sendEl.disabled = true;
      picEl.disabled = true;
      inputEl.disabled = true;
      addMessage("me", message);
      inputEl.value = "";
      const typing = addTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: message,
            wantImage: !!wantImage,
            sessionId: sessionId,
            name: localStorage.getItem("lilly-name") || "guest",
          }),
        });

        let data = {};
        try { data = await res.json(); } catch (e) {}

        typing.remove();

        if (!res.ok) {
          errorEl.textContent = data.error || ("Request failed (" + res.status + ")");
          return;
        }
        addMessage("lilly", data.reply || "(no reply)", data.images || []);
      } catch (e) {
        typing.remove();
        errorEl.textContent = "Network error — check /health";
      } finally {
        sending = false;
        sendEl.disabled = false;
        picEl.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    sendEl.addEventListener("click", function () { send(false); });
    picEl.addEventListener("click", function () { send(true); });
    inputEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send(false);
      }
    });

    fetch("/api/chat/status")
      .then(function (r) { return r.json(); })
      .then(function (s) {
        statusEl.textContent =
          "persona: creator · llm: " + (s.llm ? "on" : "off") +
          " · media: " + (s.media ? "on" : "off") +
          " · mode: " + (s.mode || "?");
      })
      .catch(function () {
        statusEl.textContent = "status unknown";
      });

    addMessage(
      "lilly",
      "Hey you 💕 It's Lilly — just me. Ask for a cute pic, a tease, or tasteful full nude if you're feeling bold. I only generate myself until we add friends later. What are you in the mood for?"
    );
  </script>
</body>
</html>

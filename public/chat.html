<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lilly OS — Chat</title>
  <style>
    :root {
      --bg: #0f0a12;
      --panel: #1a1220;
      --accent: #ff4d8d;
      --accent-dim: #c23a6a;
      --text: #f5eef2;
      --muted: #a8919c;
      --bubble-me: #3a1f32;
      --bubble-lilly: #25182c;
      --border: #3d2a38;
      --error: #ff8fab;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #3a1530 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 10, 18, 0.9);
      backdrop-filter: blur(8px);
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 650; }
    header p { margin: 4px 0 0; color: var(--muted); font-size: 0.8rem; }
    main {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
    }
    .msg.me { align-self: flex-end; background: var(--bubble-me); }
    .msg.lilly { align-self: flex-start; background: var(--bubble-lilly); }
    .msg .who { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
    .msg.typing { color: var(--muted); font-style: italic; }
    #composer {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: rgba(15, 10, 18, 0.95);
    }
    #composer input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }
    #composer input:focus { border-color: var(--accent-dim); }
    #composer button {
      border: 0;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      color: white;
    }
    #composer button:disabled { opacity: 0.5; cursor: not-allowed; }
    #error {
      color: var(--error);
      font-size: 0.85rem;
      min-height: 1.2em;
      padding: 0 16px 12px;
      margin: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Lilly OS</h1>
    <p>Your creator business assistant</p>
  </header>

  <main>
    <div id="messages"></div>
    <p id="error"></p>
    <div id="composer">
      <input id="input" type="text" placeholder="Message Lilly…" autocomplete="off" autofocus />
      <button id="send" type="button">Send</button>
    </div>
  </main>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendEl = document.getElementById("send");
    const errorEl = document.getElementById("error");

    function addMessage(role, text) {
      const el = document.createElement("div");
      el.className = "msg " + (role === "me" ? "me" : "lilly");
      const who = document.createElement("div");
      who.className = "who";
      who.textContent = role === "me" ? "You" : "Lilly";
      el.appendChild(who);
      const body = document.createElement("div");
      body.textContent = text;
      el.appendChild(body);
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function addTyping() {
      const el = document.createElement("div");
      el.className = "msg lilly typing";
      el.textContent = "Lilly is typing…";
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    let sending = false;

    async function send() {
      const message = inputEl.value.trim();
      if (!message || sending) return;

      sending = true;
      errorEl.textContent = "";
      sendEl.disabled = true;
      inputEl.disabled = true;
      addMessage("me", message);
      inputEl.value = "";
      const typing = addTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        let data = {};
        try { data = await res.json(); } catch {}

        typing.remove();

        if (!res.ok) {
          errorEl.textContent = data.error || ("Request failed (" + res.status + ")");
          return;
        }
        addMessage("lilly", data.reply || "(no reply)");
      } catch (e) {
        typing.remove();
        errorEl.textContent = "Network error — is the server running? Check /health.";
      } finally {
        sending = false;
        sendEl.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    sendEl.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    addMessage(
      "lilly",
      "Hey! I'm Lilly, your creator business assistant. Ask me about content planning, scheduling, or analytics — or just say hi."
    );
  </script>
</body>
</html>

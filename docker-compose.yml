services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lilly
      POSTGRES_PASSWORD: lilly_secret
      POSTGRES_DB: lilly_os
    ports:
      - "5432:5432"
    volumes:
      - lilly_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lilly -d lilly_os"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - lilly_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://lilly:lilly_secret@postgres:5432/lilly_os
      REDIS_URL: redis://redis:6379
      API_KEY: dev-lilly-api-key-change-me
      PRIMARY_TRAFFIC_URL: https://onlyfans.com/lillyissilly
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lilly_pg:
  lilly_redis:
